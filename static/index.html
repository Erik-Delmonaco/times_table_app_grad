<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Learning Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">🎉 Number Explorer 🎉</h1>
        
        <div class="card">
            <p class="subtitle">Solve the multiplication problem!</p>
            
            <button class="get-number-btn" id="numberBtn">
                New Problem! 🎲
            </button>
            
            <div class="number-display" id="problemDisplay">
                <p class="waiting-text">Click the button to start!</p>
            </div>
            
            <button class="show-answer-btn" id="answerBtn" style="display:none;">
                Show Answer! 👀
            </button>
            
            <div class="answer-display" id="answerDisplay"></div>
            
            <div class="celebration" id="celebration"></div>
        </div>
        
        <p class="footer">Learning numbers is fun! 🌟</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
